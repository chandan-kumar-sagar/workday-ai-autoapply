<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logo-gradient" x1="0" y1="0" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#0052D4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5" result="blur"/>
      <feOffset dx="2" dy="4" result="offsetBlur"/>
      <feMerge>
        <feMergeNode in="offsetBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="90" fill="url(#logo-gradient)" filter="url(#shadow)"/>
  <path d="M60 70L80 130L100 90L120 130L140 70" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="100" cy="90" r="6" fill="white"/>
  <path d="M100 90L100 110M80 130L70 140M120 130L130 140" stroke="white" stroke-width="3" stroke-linecap="round"/>
</svg>
